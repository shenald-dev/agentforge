<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Interactive CLI Input -->
  <rect x="50" y="150" width="120" height="60" rx="10" fill="#2d3748" stroke="#4fd1c5" stroke-width="2"/>
  <text x="110" y="185" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">CLI Engine</text>
  
  <path d="M 170 180 L 250 140" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 170 180 L 250 220" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LLM Optimizer -->
  <rect x="250" y="80" width="160" height="60" rx="10" fill="#2d3748" stroke="#f6e05e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="330" y="115" font-family="monospace" font-size="14" fill="#f6e05e" text-anchor="middle">LLMOptimizer</text>

  <!-- Template Manager -->
  <rect x="250" y="220" width="160" height="60" rx="10" fill="#2d3748" stroke="#63b3ed" stroke-width="2"/>
  <text x="330" y="255" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">TemplateManager</text>

  <path d="M 410 110 L 480 160" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 410 250 L 480 200" stroke="#4fd1c5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Project Generator -->
  <rect x="480" y="150" width="160" height="60" rx="10" fill="#2d3748" stroke="#f687b3" stroke-width="2"/>
  <text x="560" y="185" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">ProjectGenerator</text>

  <!-- Output Generation -->
  <path d="M 640 180 L 700 180" stroke="#f687b3" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="730" cy="180" r="30" fill="#22c55e" stroke="#fff" stroke-width="2"/>
  <text x="730" y="185" font-family="monospace" font-size="12" fill="#fff" text-anchor="middle">App</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#fff" />
    </marker>
  </defs>
</svg>
